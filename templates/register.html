<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <!-- CSS -->

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Font Awesome -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- Navbar -->

    <nav>

        <a href="/">Home</a>

        <a href="/register">Register</a>

        <a href="/login">Login</a>

        <a href="/dashboard">Dashboard</a>

    </nav>

    <!-- Registration Section -->

    <div class="real-register-container">

        <!-- Left Side -->

        <div class="real-register-left">

            <img
            src="https://cdn-icons-png.flaticon.com/512/295/295128.png"
            alt="register">

            <h1>Create Secure Account</h1>

            <p>
                Register to access the intelligent fraud detection system
                and monitor suspicious financial activities securely.
            </p>

        </div>

        <!-- Right Side -->

        <div class="real-register-right">

            <div class="real-register-card">

                <h2>Create Account</h2>

                <form method="POST">

                    <!-- Name -->

                    <div class="real-register-input">

                        <i class="fa-solid fa-user"></i>

                        <input
                            type="text"
                            name="name"
                            placeholder="Enter Full Name"
                            required
                        >

                    </div>

                    <!-- Email -->

                    <div class="real-register-input">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            name="email"
                            placeholder="Enter Email Address"
                            required
                        >

                    </div>

                    <!-- Password -->

                    <div class="real-register-input">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            name="password"
                            placeholder="Create Password"
                            required
                        >

                    </div>

                    <!-- Button -->

                    <button type="submit">

                        <i class="fa-solid fa-user-plus"></i>

                        Register Account

                    </button>

                </form>

                <div class="register-bottom-text">

                    Already have an account?

                    <a href="/login">Login</a>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
